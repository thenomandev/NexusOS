<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexusOS</title>

  <meta name="theme-color" content="#0b1220">

  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./css/components.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/js/all.min.js" defer></script>
</head>
<body>

<div id="modalRoot"></div>

<div id="app">

  <!-- DASHBOARD -->
  <section id="dashboardScreen" class="screen active">

    <header class="topbar">
      <button id="menuBtn" class="icon-btn">
        <i class="fas fa-bars"></i>
      </button>

      <div class="brand">
        <div class="brand-logo">N</div>
        <div>
          <h1>NexusOS</h1>
          <p>your smart workspace</p>
        </div>
      </div>

      <button id="quickCreateBtn" class="primary-btn">
        <i class="fas fa-plus"></i>
      </button>
    </header>

    <section class="stats-grid">
      <div class="stat-card">
        <h3 id="totalProjectsCount">0</h3>
        <p>Projects</p>
      </div>

      <div class="stat-card">
        <h3 id="totalButtonsCount">0</h3>
        <p>Buttons</p>
      </div>

      <div class="stat-card">
        <h3 id="totalNotesCount">0</h3>
        <p>Notes</p>
      </div>

      <div class="stat-card">
        <h3 id="trashCount">0</h3>
        <p>Trash</p>
      </div>
    </section>

    <section class="search-wrap">
      <input id="projectSearch" type="text" placeholder="Search projects...">
    </section>

    <section class="content-section">
      <div class="section-head">
        <h2>Projects</h2>
      </div>
      <div id="projectsGrid" class="projects-grid"></div>
    </section>

  </section>

  <!-- PROJECTS TAB -->
  <section id="projectsTabScreen" class="screen">
    <header class="topbar">
      <button id="projectsTabCreateBtn" class="icon-btn">
        <i class="fas fa-plus"></i>
      </button>

      <div class="brand">
        <div class="brand-logo">📁</div>
        <div>
          <h1>Projects</h1>
          <p>manage all projects</p>
        </div>
      </div>
    </header>

    <section class="search-wrap">
      <input id="projectsTabSearch" type="text" placeholder="Search projects...">
    </section>

    <section class="content-section">
      <div id="projectsTabGrid" class="projects-grid"></div>
    </section>
  </section>

  <!-- PROJECT VIEW -->
  <section id="projectScreen" class="screen">
    <header class="topbar">
      <button id="projectBackBtn" class="icon-btn">
        <i class="fas fa-arrow-left"></i>
      </button>

      <div class="brand">
        <div class="brand-logo">P</div>
        <div>
          <h1 id="projectTitle">Project</h1>
          <p id="projectMeta">0 buttons</p>
        </div>
      </div>

      <button id="addButtonBtn" class="primary-btn">
        Add
      </button>
    </header>

    <section class="search-wrap">
      <input id="buttonSearch" type="text" placeholder="Search buttons...">
    </section>

    <section class="content-section">
      <div id="buttonsGrid" class="buttons-grid"></div>
    </section>
  </section>

  <!-- VIEWER -->
  <section id="viewerScreen" class="screen">
    <header class="topbar">
      <button id="viewerBackBtn" class="icon-btn">
        <i class="fas fa-arrow-left"></i>
      </button>

      <div class="brand">
        <div class="brand-logo">W</div>
        <div>
          <h1>Viewer</h1>
          <p>in-app browser</p>
        </div>
      </div>

      <button id="viewerMenuBtn" class="icon-btn">
        <i class="fas fa-up-right-from-square"></i>
      </button>
    </header>

    <iframe id="viewerFrame"></iframe>
  </section>

  <!-- NOTES -->
  <section id="notesScreen" class="screen">
    <div class="coming-soon">
      <h2>Notes Book</h2>
      <p>Coming soon</p>
    </div>
  </section>

  <!-- WORKSPACE -->
  <section id="ideScreen" class="screen">
    <div class="coming-soon">
      <h2>Code Workspace</h2>
      <p>Coming soon</p>
    </div>
  </section>

  <!-- TRUST BIN -->
  <section id="trustBinScreen" class="screen">
    <header class="topbar">
      <div class="brand">
        <div class="brand-logo">🗑️</div>
        <div>
          <h1>Trust Bin</h1>
          <p>deleted projects</p>
        </div>
      </div>
    </header>

    <section class="content-section">
      <div id="trustBinGrid" class="projects-grid"></div>
    </section>
  </section>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button id="navDashboard" class="nav-btn active">
      <i class="fas fa-house"></i>
      <span>Dashboard</span>
    </button>

    <button id="navProjects" class="nav-btn">
      <i class="fas fa-folder"></i>
      <span>Projects</span>
    </button>

    <button id="navNotes" class="nav-btn">
      <i class="fas fa-note-sticky"></i>
      <span>Notes</span>
    </button>

    <button id="navWorkspace" class="nav-btn">
      <i class="fas fa-code"></i>
      <span>Workspace</span>
    </button>

    <button id="navTrash" class="nav-btn">
      <i class="fas fa-trash"></i>
      <span>Trust Bin</span>
    </button>
  </nav>

</div>

<!-- DRAWER -->
<div id="drawerOverlay"></div>

<aside id="sideDrawer">
  <div class="drawer-head">
    <h2>NexusOS</h2>
    <p>workspace menu</p>
  </div>

  <nav class="drawer-menu">
    <button id="drawerCreateProject">Create Project</button>
  </nav>
</aside>

<script type="module" src="./js/app.js"></script>

</body>
</html>
