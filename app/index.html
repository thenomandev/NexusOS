<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexusOS</title>

  <meta name="theme-color" content="#0b1220">

  <link rel="manifest" href="../manifest.json">
<link rel="stylesheet" href="../css/main.css">
<link rel="stylesheet" href="../css/components.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/js/all.min.js" defer></script>
</head>

<body>

<div id="app">

  <!-- DASHBOARD -->
  <section id="dashboardScreen" class="screen active">

    <header class="topbar">
      <button id="menuBtn" class="icon-btn">
        <i class="fas fa-bars"></i>
      </button>

      <div class="brand">
        <div class="brand-logo">N</div>
        <div>
          <h1>NexusOS</h1>
          <p>your smart workspace</p>
        </div>
      </div>

      <button id="quickCreateBtn" class="primary-btn">
        <i class="fas fa-plus"></i>
      </button>
    </header>

    <section class="stats-grid">
      <div class="stat-card">
        <h3 id="totalProjectsCount">0</h3>
        <p>Projects</p>
      </div>

      <div class="stat-card">
        <h3 id="totalButtonsCount">0</h3>
        <p>Buttons</p>
      </div>

      <div class="stat-card">
        <h3 id="totalNotesCount">0</h3>
        <p>Notes</p>
      </div>

      <div class="stat-card">
        <h3 id="trashCount">0</h3>
        <p>Trash</p>
      </div>
    </section>

    <section class="search-wrap">
      <input
        id="projectSearch"
        type="text"
        placeholder="Search projects..."
      >
    </section>

    <section class="content-section">
      <div class="section-head">
        <h2>Projects</h2>
      </div>

      <div id="projectsGrid" class="projects-grid"></div>
    </section>

  </section>

  <!-- PROJECT VIEW -->
  <section id="projectScreen" class="screen">

    <header class="topbar">
      <button id="projectBackBtn" class="icon-btn">
        <i class="fas fa-home"></i>
      </button>

      <div class="brand">
        <div class="brand-logo">P</div>
        <div>
          <h1 id="projectTitle">Project</h1>
          <p id="projectMeta">0 buttons</p>
        </div>
      </div>

      <div class="header-actions">
        <button id="toggleViewBtn" class="secondary-btn">
          List View
        </button>

        <button id="addButtonBtn" class="primary-btn">
          Add
        </button>
      </div>
    </header>

    <section class="search-wrap">
      <input
        id="buttonSearch"
        type="text"
        placeholder="Search buttons..."
      >
    </section>

    <section class="content-section">
      <div class="section-head">
        <h2>All Buttons</h2>
      </div>

      <div id="buttonsGrid" class="buttons-grid"></div>
    </section>

  </section>

  <!-- WEBSITE VIEWER -->
  <section id="viewerScreen" class="screen">

    <header class="topbar">
      <button id="viewerBackBtn" class="icon-btn">
        <i class="fas fa-arrow-left"></i>
      </button>

      <div class="brand">
        <div class="brand-logo">W</div>
        <div>
          <h1>Viewer</h1>
          <p>in-app browser</p>
        </div>
      </div>

      <button id="viewerMenuBtn" class="icon-btn">
        <i class="fas fa-bars"></i>
      </button>
    </header>

    <iframe id="viewerFrame"></iframe>

  </section>

  <!-- NOTES -->
  <section id="notesScreen" class="screen">
    <div class="coming-soon">
      <h2>Notes Book</h2>
      <p>Coming in next file</p>
    </div>
  </section>

  <!-- IDE -->
  <section id="ideScreen" class="screen">
    <div class="coming-soon">
      <h2>Mini IDE</h2>
      <p>Coming in next file</p>
    </div>
  </section>

</div>

<!-- SIDE DRAWER -->
<div id="drawerOverlay"></div>

<aside id="sideDrawer">

  <div class="drawer-head">
    <h2>NexusOS</h2>
    <p>workspace menu</p>
  </div>

  <nav class="drawer-menu">
    <button id="drawerCreateProject">Create Project</button>
    <button id="drawerRenameProject">Edit Project Name</button>
    <button id="drawerDeleteProject">Delete Project</button>
    <button id="drawerProjectTrash">Project Trust Bin</button>
    <button id="drawerBackup">Backup & Restore</button>
    <button id="drawerNotes">Notes Book</button>
    <button id="drawerIDE">Code Workspace</button>
    <button id="drawerAbout">About</button>
  </nav>

</aside>

<!-- GLOBAL MODAL ROOT -->
<div id="modalRoot"></div>

<script type="module" src="../js/app.js?v=5"></script>
</body>
</html>
